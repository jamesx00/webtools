<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Image Compressor</title>
    <link rel="stylesheet" href="style.css"/>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Image Compressor</h1>
        <p class="subtitle">Compress JPEG, PNG &amp; WEBP files in your browser. Nothing is uploaded.</p>
      </header>

      <section class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Drop images here or click to browse">
        <div class="dropzone__inner">
          <svg
            class="dropzone__icon"
            xmlns="http://www.w3.org/2000/svg"
            width="48"
            height="48"
            viewbox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/> </svg>
          <p class="dropzone__text">Drop images here or
            <span class="dropzone__browse">browse</span>
          </p>
          <p class="dropzone__hint">JPEG, PNG and WebP supported</p>
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple hidden/>
      </section>

      <section class="controls">
        <div class="control-group">
          <label for="quality" class="control-label">
            Quality
            <span class="control-value" id="qualityValue">80</span>
          </label>
          <input type="range" id="quality" min="1" max="100" value="80" class="slider"/>
        </div>
        <div class="control-group">
          <label for="maxWidth" class="control-label">Max width (px)</label>
          <input type="number" id="maxWidth" min="1" value="2000" class="number-input"/>
        </div>
        <div class="control-group control-group--inline">
          <label for="convertWebp" class="control-label">Convert to WebP</label>
          <input type="checkbox" id="convertWebp" class="toggle" checked/>
        </div>
      </section>

      <section class="queue" id="queue" hidden>
        <div class="queue__list" id="queueList"></div>
        <div class="queue__actions">
          <button class="btn btn--secondary" id="clearAll">Clear all</button>
          <button class="btn btn--primary" id="downloadAll">Download all as ZIP</button>
        </div>
      </section>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
